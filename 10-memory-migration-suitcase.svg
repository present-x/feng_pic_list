<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background: warm paper-like cream color -->
  <rect width="800" height="450" fill="#FAF6EE" />
  
  <!-- Desk surface (cozy wood tone) -->
  <rect x="0" y="320" width="800" height="130" fill="#D2B48C" opacity="0.4" />
  <line x1="0" y1="320" x2="800" y2="320" stroke="#8C6D4F" stroke-width="2" opacity="0.6" />

  <!-- Shelves in the background -->
  <rect x="500" y="100" width="250" height="15" rx="5" fill="#A88C6F" />
  <rect x="500" y="240" width="250" height="15" rx="5" fill="#A88C6F" />

  <!-- Notebooks on the shelves -->
  <rect x="520" y="30" width="25" height="70" rx="3" fill="#D67B66" transform="rotate(5, 520, 30)" />
  <rect x="550" y="30" width="25" height="70" rx="3" fill="#E8B07D" />
  <rect x="580" y="30" width="22" height="70" rx="3" fill="#88A0A8" transform="rotate(-10, 580, 30)" />
  
  <rect x="620" y="170" width="25" height="70" rx="3" fill="#88A0A8" />
  <rect x="650" y="170" width="25" height="70" rx="3" fill="#E8B07D" />

  <!-- A small warm desk lamp casting amber light -->
  <path d="M 120 320 L 120 180 C 120 180, 120 140, 160 140 L 180 140" fill="none" stroke="#6D5541" stroke-width="6" stroke-linecap="round" />
  <path d="M 170 120 L 210 120 L 225 155 L 155 155 Z" fill="#D67B66" />
  <!-- Glow effect -->
  <polygon points="155,155 225,155 350,320 50,320" fill="url(#lamp-glow)" opacity="0.15" />

  <!-- The central suitcase in foreground on the desk -->
  <!-- Suitcase body (cozy warm terracotta) -->
  <rect x="220" y="200" width="240" height="160" rx="15" fill="#C86A55" stroke="#9A4D3A" stroke-width="4" />
  <rect x="240" y="195" width="200" height="10" rx="3" fill="#E8B07D" opacity="0.8" />
  
  <!-- Suitcase handle -->
  <path d="M 310 200 L 310 180 C 310 175, 370 175, 370 180 L 370 200" fill="none" stroke="#7A4C3A" stroke-width="8" stroke-linecap="round" />

  <!-- Suitcase corners (retro leather patches) -->
  <path d="M 220 230 C 220 215, 235 200, 250 200 L 220 200 Z" fill="#8B4F3F" />
  <path d="M 460 230 C 460 215, 445 200, 430 200 L 460 200 Z" fill="#8B4F3F" />
  <path d="M 220 330 C 220 345, 235 360, 250 360 L 220 360 Z" fill="#8B4F3F" />
  <path d="M 460 330 C 460 345, 445 360, 430 360 L 460 360 Z" fill="#8B4F3F" />

  <!-- Suitcase straps -->
  <rect x="260" y="200" width="15" height="160" fill="#7A4C3A" />
  <rect x="405" y="200" width="15" height="160" fill="#7A4C3A" />
  <!-- Strap buckles -->
  <rect x="257" y="260" width="21" height="20" rx="3" fill="#D3A26A" stroke="#7A4C3A" stroke-width="2" />
  <rect x="402" y="260" width="21" height="20" rx="3" fill="#D3A26A" stroke="#7A4C3A" stroke-width="2" />

  <!-- The suitcase is half-open, revealing memories inside -->
  <!-- Draw some folded paper, letters, and ribbons spilling out gently -->
  <path d="M 235 210 L 235 185 C 235 185, 255 170, 275 180 L 285 210 Z" fill="#FFFDFC" stroke="#A88C6F" stroke-width="2" />
  <path d="M 270 210 L 290 160 L 330 170 L 310 210 Z" fill="#FDF3E7" stroke="#A88C6F" stroke-width="2" />
  
  <!-- Ribbon tied around letters -->
  <path d="M 290 160 Q 300 145, 310 160" fill="none" stroke="#D67B66" stroke-width="3" />
  <path d="M 300 152 Q 285 140, 290 130" fill="none" stroke="#D67B66" stroke-width="2" />
  <path d="M 300 152 Q 315 140, 310 130" fill="none" stroke="#D67B66" stroke-width="2" />

  <!-- A small notebook peeking out of the suitcase -->
  <rect x="330" y="160" width="65" height="50" rx="4" fill="#88A0A8" stroke="#5D737A" stroke-width="2" transform="rotate(-15, 330, 160)" />
  <rect x="335" y="165" width="55" height="10" fill="#EAEAEA" opacity="0.6" transform="rotate(-15, 335, 165)" />

  <!-- Floating warm memory sparks / light particles representing smooth transition to the shelf -->
  <g opacity="0.8">
    <path d="M 320 130 Q 380 90, 480 120" fill="none" stroke="#E8B07D" stroke-width="2" stroke-dasharray="4,4" />
    <path d="M 380 150 Q 440 100, 520 160" fill="none" stroke="#E8B07D" stroke-width="2" stroke-dasharray="4,4" />
    
    <circle cx="380" cy="110" r="5" fill="#E8B07D" />
    <circle cx="440" cy="125" r="4" fill="#D67B66" />
    <circle cx="470" cy="95" r="6" fill="#F4D35E" />
    <circle cx="500" cy="135" r="3" fill="#E8B07D" />
  </g>

  <!-- Gradients -->
  <defs>
    <radialGradient id="lamp-glow" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#FFF0BD" stop-opacity="1" />
      <stop offset="100%" stop-color="#FAF6EE" stop-opacity="0" />
    </radialGradient>
  </defs>
</svg>
