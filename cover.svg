<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 400" width="100%" height="100%">
  <!-- Background: Deep, warm twilight sky gradient -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D1F18" />
      <stop offset="40%" stop-color="#4A2E20" />
      <stop offset="80%" stop-color="#8B4F35" />
      <stop offset="100%" stop-color="#D68A5C" />
    </linearGradient>

    <!-- Warm golden glow for light effects -->
    <radialGradient id="deskGlow" cx="30%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#FFE0BD" stop-opacity="1" />
      <stop offset="50%" stop-color="#E8B07D" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#2D1F18" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="shelfGlow" cx="80%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#FFF0BD" stop-opacity="0.8" />
      <stop offset="60%" stop-color="#D67B66" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#2D1F18" stop-opacity="0" />
    </radialGradient>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#1A0D07" flood-opacity="0.3" />
    </filter>
  </defs>

  <rect width="940" height="400" fill="url(#skyGrad)" />

  <!-- Stars / Glowing particles in the background sky -->
  <g opacity="0.6">
    <circle cx="150" cy="80" r="1.5" fill="#FFF" />
    <circle cx="280" cy="120" r="1" fill="#FFF" />
    <circle cx="340" cy="70" r="2" fill="#FFEAA7" opacity="0.8" />
    <circle cx="450" cy="110" r="1.5" fill="#FFF" />
    <circle cx="580" cy="60" r="1.2" fill="#FFF" />
    <circle cx="690" cy="100" r="2" fill="#FFF" />
    <circle cx="820" cy="90" r="1" fill="#FFEAA7" />
    <!-- Twinkle stars -->
    <path d="M 220 60 L 222 65 L 227 67 L 222 69 L 220 74 L 218 69 L 213 67 L 218 65 Z" fill="#FFF" opacity="0.7" />
    <path d="M 750 50 L 751.5 54 L 755 55.5 L 751.5 57 L 750 61 L 748.5 57 L 745 55.5 L 748.5 54 Z" fill="#FFEAA7" opacity="0.9" />
  </g>

  <!-- Distant cozy landscape silhouettes (rolling warm-toned mountains) -->
  <path d="M 0 320 Q 250 280, 500 330 T 940 290 L 940 400 L 0 400 Z" fill="#3D251C" />
  <path d="M 0 350 Q 350 310, 700 360 T 940 330 L 940 400 L 0 400 Z" fill="#2E1B14" />

  <!-- The Bridge of Floating Pages (connecting left and right) -->
  <!-- We draw a beautiful golden thread/stream of particles and pages -->
  <path d="M 180 260 Q 470 120, 760 200" fill="none" stroke="#FFE0BD" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 10" opacity="0.8" />
  
  <!-- Flow of warm paper sheets floating across -->
  <g filter="url(#softShadow)" opacity="0.9">
    <!-- Page 1 (near left desk) -->
    <rect x="230" y="210" width="35" height="45" rx="3" fill="#FFFDFC" transform="rotate(-15, 230, 210)" stroke="#A88C6F" stroke-width="1" />
    <line x1="238" y1="220" x2="258" y2="215" stroke="#E5DCD3" stroke-width="1.5" transform="rotate(-15, 230, 210)" />
    <line x1="238" y1="228" x2="253" y2="224" stroke="#E5DCD3" stroke-width="1.5" transform="rotate(-15, 230, 210)" />
    <line x1="238" y1="236" x2="260" y2="230" stroke="#E5DCD3" stroke-width="1.5" transform="rotate(-15, 230, 210)" />

    <!-- Page 2 (mid-high left) -->
    <rect x="360" y="160" width="35" height="45" rx="3" fill="#FFFDFC" transform="rotate(10, 360, 160)" stroke="#A88C6F" stroke-width="1" />
    <!-- Page 3 (apex of the curve) -->
    <rect x="470" y="145" width="35" height="45" rx="3" fill="#FFFDFC" transform="rotate(-5, 470, 145)" stroke="#A88C6F" stroke-width="1" />
    <line x1="478" y1="155" x2="498" y2="153" stroke="#E5DCD3" stroke-width="1.5" transform="rotate(-5, 470, 145)" />
    <line x1="478" y1="163" x2="493" y2="161" stroke="#E5DCD3" stroke-width="1.5" transform="rotate(-5, 470, 145)" />
    
    <!-- Page 4 (descending right) -->
    <rect x="590" y="165" width="35" height="45" rx="3" fill="#FDF3E7" transform="rotate(25, 590, 165)" stroke="#D3A26A" stroke-width="1" />
    <!-- Page 5 (near right shelf) -->
    <rect x="690" y="195" width="35" height="45" rx="3" fill="#FDF3E7" transform="rotate(-12, 690, 195)" stroke="#D3A26A" stroke-width="1" />
  </g>

  <!-- Golden glow under the floating pages -->
  <circle cx="250" cy="220" r="40" fill="url(#deskGlow)" opacity="0.3" />
  <circle cx="480" cy="160" r="60" fill="url(#deskGlow)" opacity="0.2" />
  <circle cx="710" cy="210" r="40" fill="url(#shelfGlow)" opacity="0.3" />

  <!-- Left Platform: A cozy study desk/table with a glowing reading lamp (Claude Side) -->
  <g filter="url(#softShadow)">
    <!-- Table base -->
    <rect x="40" y="270" width="180" height="130" rx="10" fill="#5C3A21" />
    <rect x="30" y="260" width="200" height="15" rx="4" fill="#8B5A2B" />

    <!-- Open Notebook with warm pages -->
    <path d="M 90 250 L 130 245 L 130 260 L 90 265 Z" fill="#FFF" stroke="#6D5541" />
    <path d="M 130 245 L 170 250 L 170 265 L 130 260 Z" fill="#FFF" stroke="#6D5541" />
    
    <!-- Warm brass study lamp casting light -->
    <path d="M 60 260 L 60 190 C 60 190, 60 170, 80 170 L 90 170" fill="none" stroke="#D3A26A" stroke-width="4" />
    <path d="M 80 160 L 110 160 L 120 185 L 70 185 Z" fill="#C86A55" />
    <!-- Lamp glow polygon -->
    <polygon points="70,185 120,185 240,260 40,260" fill="url(#deskGlow)" opacity="0.4" />
  </g>

  <!-- Right Platform: Elegant wooden archival bookshelf/cabinet (Codex/Importer Side) -->
  <g filter="url(#softShadow)">
    <rect x="730" y="210" width="170" height="190" rx="8" fill="#5C3A21" />
    <!-- Shelves inside cabinet -->
    <rect x="740" y="265" width="150" height="8" rx="2" fill="#8B5A2B" />
    <rect x="740" y="325" width="150" height="8" rx="2" fill="#8B5A2B" />
    
    <!-- Archival folders and books standing and glowing -->
    <!-- Top shelf -->
    <rect x="755" y="225" width="20" height="40" rx="2" fill="#D67B66" />
    <rect x="778" y="225" width="20" height="40" rx="2" fill="#E8B07D" />
    <rect x="801" y="228" width="18" height="37" rx="2" fill="#88A0A8" transform="rotate(-15, 801, 228)" />
    
    <!-- Second shelf -->
    <rect x="750" y="285" width="18" height="40" rx="2" fill="#88A0A8" />
    <rect x="771" y="285" width="18" height="40" rx="2" fill="#88A0A8" />
    <rect x="792" y="285" width="22" height="40" rx="2" fill="#D67B66" />
    <rect x="817" y="285" width="18" height="40" rx="2" fill="#E8B07D" />
    
    <!-- Mini warm glowing bulb/lantern on the shelf -->
    <circle cx="865" cy="245" r="8" fill="#FFF" />
    <circle cx="865" cy="245" r="16" fill="#FFF0BD" opacity="0.5" />
  </g>

  <!-- Floating golden sparkles representing seamless transfer -->
  <g opacity="0.8">
    <circle cx="300" cy="180" r="4" fill="#FFEAA7" />
    <circle cx="420" cy="140" r="3" fill="#D67B66" />
    <circle cx="530" cy="185" r="5" fill="#E8B07D" />
    <circle cx="650" cy="155" r="3" fill="#FFEAA7" />
  </g>
</svg>
